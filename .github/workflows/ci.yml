name: CI

on: [push, pull_request]

jobs:
  test-feature-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r feature-engine-agent/requirements.txt
      - run: python feature-engine-agent/data/generate.py
      - run: pytest feature-engine-agent/tests/ -v

  test-ml-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r ml-pipeline-agent/requirements.txt
      - run: python ml-pipeline-agent/data/generate.py
      - run: pytest ml-pipeline-agent/tests/ -v
